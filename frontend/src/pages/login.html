<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión - Aura Travel</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div id="header-container"></div>

  <button class="sidebar__toggle" id="sidebarToggle" aria-label="Abrir menú">☰</button>

  <div class="sidebar__overlay" id="sidebarOverlay"></div>

  <main class="main-content" id="mainContent">

    <section class="seccion">
      <div class="container">
        <div class="auth-layout">
          <form id="loginForm" class="form form-auth">
            <h2>Iniciar Sesión</h2>
            <div class="form-group">
              <label for="Email">Email:</label>
              <input type="email" id="Email" required>
            </div>
            <div class="form-group">
              <label for="Contrasena">Contraseña:</label>
              <input type="password" id="Contrasena" required>
            </div>
            <button type="submit" class="btn">Ingresar</button>
            <p id="errorMessage" class="error" style="color: var(--color-error); text-align: center; margin-top: 1rem;"></p>
            <p style="text-align: center; margin-top: 2rem; color: var(--color-texto-claro); font-size: 0.95rem;">
              ¿No tienes cuenta? <a href="/src/pages/register.html" style="color: var(--color-secundario); text-decoration: none; font-weight: 600;">Regístrate</a>
            </p>
          </form>
        </div>
      </div>
    </section>

    <div id="footer-container"></div>

  </main>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/login.js"></script>

</body>
</html>
