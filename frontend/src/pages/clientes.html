<!-- frontend/pages/clientes.html -->
<section id="seccion-clientes" class="seccion activa">

    <div class="section-toolbar">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="buscador-clientes" placeholder="Buscar por nombre, documento, correo...">
        </div>
        <button class="btn-nuevo" id="btnNuevoCliente">➕ Nuevo Cliente</button>
    </div>

    <div id="lista"></div>
    <div class="paginacion" id="paginacion-clientes"></div>
</section>

<!-- MODAL CLIENTES -->
<div class="modal-overlay" id="modal-clientes">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="clientes-form-title">➕ Nuevo Cliente</h3>
            <button class="modal-close" id="btnCerrarModalCliente">✕</button>
        </div>
        <form id="form-clientes" class="modal-form">
            <input type="hidden" id="id">
            <div class="form-group">
                <label>📄 Nro Documento</label>
                <input type="text" id="nroDocumento" placeholder="Número de documento" required>
            </div>
            <div class="form-group">
                <label>👤 Nombre</label>
                <input type="text" id="nombre" placeholder="Nombre" required>
            </div>
            <div class="form-group">
                <label>👤 Apellido</label>
                <input type="text" id="apellido" placeholder="Apellido" required>
            </div>
            <div class="form-group">
                <label>🏠 Dirección</label>
                <input type="text" id="direccion" placeholder="Dirección (opcional)">
            </div>
            <div class="form-group">
                <label>📧 Correo</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
            </div>
            <div class="form-group">
                <label>📱 Teléfono</label>
                <input type="tel" id="telefono" placeholder="Teléfono" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancelar" id="btnLimpiarCliente">🔄 Cancelar</button>
                <button type="submit" class="btn-guardar">💾 Guardar</button>
            </div>
        </form>
    </div>
</div>
